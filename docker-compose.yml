version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: pos_backend
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3001
    restart: always

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: pos_frontend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      # Internal docker networking URL for NextJS SSR/rewrites to call NestJS
      - BACKEND_URL=http://backend:3001
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
    depends_on:
      - backend
    restart: always

# OPTIONAL: If you want to host PostgreSQL within the same compose service,
# uncomment the section below and update the backend's DATABASE_URL env to:
# DATABASE_URL=postgresql://postgres:password@postgres:5432/pos_db?schema=public
#
#   postgres:
#     image: postgres:15-alpine
#     container_name: pos_postgres
#     ports:
#       - "5432:5432"
#     environment:
#       - POSTGRES_USER=postgres
#       - POSTGRES_PASSWORD=password
#       - POSTGRES_DB=pos_db
#     volumes:
#       - postgres_data:/var/lib/postgresql/data
#     restart: always
